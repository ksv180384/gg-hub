file_uploads = On
upload_max_filesize = 12M
post_max_size = 12M
max_execution_time = 600

; GD уже включается при сборке образа (docker-php-ext-install gd)

; OPcache (расширение ставится в _docker/php/php.dockerfile: docker-php-ext-install opcache)
[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; с bind-mount ./backend при 1 PHP подхватывает изменения без пересборки образа
opcache.validate_timestamps=1
opcache.revalidate_freq=0
