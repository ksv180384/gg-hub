map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Внутренний API для SSR (Docker-сеть, без SSL)
# Node.js SSR-сервер обращается сюда с Host: admin.gg-hub.ru / gg-hub.ru
server {
    listen 81;
    server_name _;

    charset utf-8;
    client_max_body_size 500M;

    set $subdomain "";
    if ($http_host ~* ^([a-z0-9-]+)\.gg-hub\.ru$) {
        set $subdomain $1;
    }

    location /api/v1 {
        root /var/www/gg/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum/csrf-cookie {
        root /var/www/gg/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/gg/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass gg-php_8.4:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_ORIGINAL_HOST $http_host;
        fastcgi_param HTTP_X_SUBDOMAIN $subdomain;
    }
}

# Редирект HTTP -> HTTPS для gg-hub.ru и поддоменов
server {
    listen 80;
    server_name gg-hub.ru *.gg-hub.ru;
    client_max_body_size 500M;

    # ACME challenge для Let's Encrypt (certbot renew)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Webmail (Roundcube) — mail778.gg-hub.ru
server {
    listen 443 ssl;
    http2 on;
    server_name mail778.gg-hub.ru;

    ssl_certificate     /etc/letsencrypt/live/gg-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gg-hub.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location / {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $roundcube_upstream roundcube:80;
        proxy_pass http://$roundcube_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name gg-hub.ru *.gg-hub.ru;

    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/gg-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gg-hub.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 500M;

    # Поддомены gg-hub.ru
    if ($host ~* ^([a-z0-9-]+)\.gg-hub\.ru$) {
        set $subdomain $1;
    }
    if ($host = gg-hub.ru) {
        set $subdomain "";
    }

    location /api/v1 {
        root /var/www/gg/public;
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # OAuth (Socialite) — передаём в Laravel
    location /auth/ {
        root /var/www/gg/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Email verification — передаём в Laravel
    location /email/ {
        root /var/www/gg/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Раздача файлов из Laravel storage (изображения игр и т.д.)
    location /storage/ {
        alias /var/www/gg/public/storage/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /socket.io/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $socket_upstream socket-server-nodejs:3007;
        proxy_pass http://$socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Статика Vite (без SSR) — отдаём с диска; HTML и остальные маршруты — Node SSR (server.mjs)
    location ^~ /assets/ {
        alias /var/www/frontend/dist/client/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $frontend_upstream gg-frontend:3008;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ~ \.php$ {
        root /var/www/gg/public;
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass gg-php_8.4:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTP_X_SUBDOMAIN $subdomain;
    }

    location ~ /\.ht {
        deny all;
    }
}
