map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    client_max_body_size 500M;
    server_name gg-hub.local *.gg-hub.local;

    # Корневая директория Laravel-приложения
    root /var/www/gg/public;
    index index.php index.html index.htm;

    # Основные заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Обработка поддоменов
    if ($host ~* ^([a-z0-9-]+)\.gg-hub\.local$) {
        set $subdomain $1;
    }

    # Обработка запросов к API
    location /api/v1 {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # OAuth (Socialite) — передаём в Laravel
    location /auth/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Раздача файлов из Laravel storage (изображения игр и т.д.)
    location /storage/ {
        alias /var/www/gg/public/storage/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.IO (рулетка аукциона): тот же origin в браузере → сюда → socket_server
    location /socket.io/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $socket_upstream socket-server-nodejs:3007;
        proxy_pass http://$socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Возвращаем прежнюю обработку фронтенда (резолв через Docker DNS при запросе — см. gg-frontend depends_on nginx)
    location / {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $frontend_upstream gg-frontend:3008;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    # Обработка PHP-запросов
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass gg-php_8.4:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_X_ORIGINAL_HOST $host;
        fastcgi_param HTTP_X_SUBDOMAIN $subdomain;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\.ht {
        deny all;
    }
}

# Webmail (Roundcube) — mail.gg-hub.local
server {
    listen 80;
    server_name mail.gg-hub.local;

    client_max_body_size 25M;

    location / {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $roundcube_upstream roundcube:80;
        proxy_pass http://$roundcube_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
