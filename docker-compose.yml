services:
    # nginx
    gg-nginx:
        container_name: gg-nginx-container
        image: nginx:stable-alpine
        ports:
            - "${NGINX_TO_PORT}:${NGINX_FROM_PORT}"
            - "${NGINX_TO_PORT_SSL}:${NGINX_FROM_PORT_SSL}"
        volumes:
            - ./backend:/var/www/gg
            - ./frontend/dist:/var/www/frontend/dist
            - ./_docker/nginx/${NGINX_CONFIG}:/etc/nginx/conf.d/default.conf
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        depends_on:
            - gg-php_8.4
            - gg-mariadb
        networks:
            - gg

    # Сервис для Node.js с Vue 3 (фронтенд)
    gg-frontend:
        container_name: gg_frontend
        build:
            context: .
            dockerfile: ./_docker/frontend/node.dockerfile
        volumes:
            - ./frontend:/gg
            - frontend_node_modules:/gg/node_modules
            - ./frontend/dist:/gg/dist
        ports:
            - "3008:3008"
            - "24678:24678"
        environment:
            - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING}
            - NODE_ENV=${NODE_ENV}
            - VITE_SSR_API_ORIGIN=${VITE_SSR_API_ORIGIN:-http://gg-nginx:81}
            # Прокси Vite dev → socket_server (браузер ходит на тот же origin, /socket.io)
            - VITE_SOCKET_DEV_PROXY_TARGET=${VITE_SOCKET_DEV_PROXY_TARGET:-http://socket-server-nodejs:3007}
        depends_on:
            - gg-nginx
            - socket-server-nodejs
        networks:
            - gg

    #php
    gg-php_8.4:
        container_name: gg-php-8-container
        build:
            context: .
            dockerfile: ./_docker/php/php.dockerfile
        volumes:
            - ./backend/:/var/www/gg
            - ./_docker/php/php.ini:/usr/local/etc/php/php.ini
            - ./_docker/php/start.sh:/usr/local/bin/gg-start.sh:ro
        # Запускаем три процесса в одном контейнере:
        #  1) php artisan queue:work     — обработка очереди джобов (--max-time=3600 + цикл, чтобы воркер периодически перезапускался и подхватывал свежий код)
        #  2) php artisan schedule:work  — планировщик (Laravel 11/12), эквивалент cron `* * * * *` (нужен для discord:notify-events-starting)
        #  3) php-fpm                    — основной HTTP-обработчик (foreground)
        # При падении любого из них контейнер завершится и Docker (restart: unless-stopped) поднимет его заново.
        command: ["bash", "/usr/local/bin/gg-start.sh"]
        restart: unless-stopped
        depends_on:
            - gg-mariadb
        ports:
            - "3004:3004"
        networks:
            - gg

    #mysql
    gg-mariadb:
        container_name: gg-mariadb-container
        image: mariadb:latest
        ports:
            - "${DB_TO_PORT}:${DB_FROM_PORT}"
        volumes:
            - ./_docker/mysql:/var/lib/mysql
        command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        restart: always
        environment:
            MYSQL_DATABASE: gg
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        networks:
            - gg

#    gg-redis:
#        image: redis:alpine
#        ports:
#            - "6379:6379"
#        networks:
#            - gg

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
#        profiles:
#            - dev
        links:
            - gg-mariadb:db
        restart: always
        ports:
            - "3002:80"
        environment:
            UPLOAD_LIMIT: 500M
            PMA_ARBITRARY: 1
        networks:
            - gg

    socket-server-nodejs:
        container_name: socket_server
        build:
            context: .
            dockerfile: ./_docker/socket_server/socket_server.dockerfile
        restart: unless-stopped
        volumes:
            - ./socket_server:/var/www/socket_server
            # Свой node_modules в контейнере (Linux): иначе с хоста подтягиваются .bin без +x → nodemon: Permission denied
            - socket_server_node_modules:/var/www/socket_server/node_modules
        environment:
            NODE_ENV: development
        command: sh -c "npm install && npm run dev"
        ports:
            - "3007:3007"
        networks:
            - gg

    certbot:
        build:
            context: .
            dockerfile: ./_docker/certbot/renew.dockerfile
        container_name: certbot
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
            # для автообновления wildcard (Cloudflare); см. certbot/cloudflare.ini.example
            - ./certbot/cloudflare.ini:/opt/cloudflare.ini:ro
            - /var/run/docker.sock:/var/run/docker.sock
        entrypoint: >
            /bin/sh -c
            'trap exit TERM;
            while :;
            do certbot renew --deploy-hook "docker exec gg-nginx-container nginx -s reload";
            sleep 12h & wait $${!};
            done;'
        depends_on:
            - gg-nginx
        networks:
            - gg

    # Mail server (Postfix + Dovecot + DKIM + Rspamd)
    mailserver:
        image: ghcr.io/docker-mailserver/docker-mailserver:latest
        container_name: gg-mailserver
        hostname: mail778.gg-hub.ru
        env_file: ./_docker/mailserver/mailserver.env
        ports:
            - "25:25"
            - "465:465"
            - "587:587"
            - "993:993"
        volumes:
            - mailserver_data:/var/mail
            - mailserver_state:/var/mail-state
            - mailserver_logs:/var/log/mail
            - mailserver_config:/tmp/docker-mailserver
            - ./certbot/conf:/etc/letsencrypt:ro
            - /etc/localtime:/etc/localtime:ro
        restart: unless-stopped
        cap_add:
            - NET_ADMIN
        networks:
            gg:
                aliases:
                    - mail778.gg-hub.ru

    # Webmail (Roundcube)
    roundcube:
        image: roundcube/roundcubemail:latest
        container_name: gg-roundcube
        volumes:
            - roundcube_data:/var/roundcube/db
            - ./_docker/roundcube/custom.inc.php:/var/roundcube/config/custom.inc.php:ro
        environment:
            ROUNDCUBEMAIL_DEFAULT_HOST: ssl://mail778.gg-hub.ru
            ROUNDCUBEMAIL_DEFAULT_PORT: 993
            ROUNDCUBEMAIL_SMTP_SERVER: tls://mail778.gg-hub.ru
            ROUNDCUBEMAIL_SMTP_PORT: 587
            ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE: 25M
            ROUNDCUBEMAIL_DB_TYPE: sqlite
            ROUNDCUBEMAIL_SKIN: elastic
        depends_on:
            - mailserver
        restart: unless-stopped
        networks:
            - gg

volumes:
    frontend_node_modules:
    socket_server_node_modules:
    mailserver_data:
    mailserver_state:
    mailserver_logs:
    mailserver_config:
    roundcube_data:

networks:
    gg:
